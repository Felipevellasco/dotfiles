---

- name: Create AUR builder user
  ansible.builtin.user:
    name: aurbuilder
    groups: wheel
    create_home: true
  become: true

- name: Allow aurbuilder to use pacman without password
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/aurbuilder
    line: "aurbuilder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'
  become: true

- name: Ensure aurbuilder's ansible tmp directory exists
  ansible.builtin.file:
    path: "/home/aurbuilder/.ansible/tmp"
    state: directory
    owner: aurbuilder
    group: aurbuilder
    mode: '0700'
  become: true

- name: Check if yay is installed
  ansible.builtin.command: which yay
  register: yay_check
  changed_when: false
  failed_when: false

- name: Install yay AUR helper
  when: yay_check.rc != 0
  block:
    - name: Clone yay repository
      ansible.builtin.git:
        repo: https://aur.archlinux.org/yay-bin.git
        dest: /tmp/yay-bin
      become: true
      become_user: aurbuilder

    - name: Build and install yay
      ansible.builtin.command: makepkg -si --noconfirm > /dev/tty
      args:
        chdir: /tmp/yay-bin
      changed_when: true
      become: true
      become_user: aurbuilder

...
